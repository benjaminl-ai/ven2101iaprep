<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Briefing Master - Modular Practice</title>
    <style>
        :root {
            --primary: #2563eb; --bg: #f3f4f6; --white: #ffffff;
            --accent: #f59e0b; --dark: #1f2937; --success: #10b981;
        }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--dark); }
        
        header { background: var(--dark); color: white; padding: 12px; text-align: center; }
        
        /* Main Tabs */
        .main-tabs { display: flex; background: white; border-bottom: 1px solid #ddd; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; font-weight: bold; cursor: pointer; color: var(--grey); border-bottom: 3px solid transparent; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

        .container { padding: 15px; max-width: 800px; margin: 0 auto; display: none; }
        .container.active { display: block; }

        /* Sidebar Nav */
        .section-nav { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 15px; }
        .nav-item { padding: 10px; background: #e5e7eb; border: none; border-radius: 6px; font-weight: bold; font-size: 0.8rem; cursor: pointer; }
        .nav-item.active { background: var(--primary); color: white; }

        /* Workspace Cards */
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .box-label { font-weight: bold; color: var(--primary); font-size: 0.9rem; margin-bottom: 10px; display: block; background: #eff6ff; padding: 5px 10px; border-radius: 4px; }
        
        .exp-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f5f9; gap: 10px; }
        .exp-text { font-size: 0.95rem; color: #374151; flex: 1; }
        
        .btn-mini { padding: 5px 12px; border-radius: 15px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 0.8rem; }
        .btn-mini:hover { background: #f1f5f9; }

        /* Detail Inputs */
        .detail-input-group { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        input[type="date"], input[type="number"], select { padding: 8px; border-radius: 6px; border: 1px solid #ccc; }

        /* Vocab Page */
        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .vocab-item { background: white; padding: 12px; border-radius: 8px; text-align: center; border: 1px solid #e5e7eb; }
        .vocab-word { font-weight: bold; display: block; margin-bottom: 8px; color: var(--dark); }
        .v-tag { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; margin-bottom: 5px; display: inline-block; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; font-size: 1.1rem;">VEN1101 Briefing Master</div>
</header>

<div class="main-tabs">
    <button class="tab-btn active" onclick="switchTab('practice')">Practice Dashboard</button>
    <button class="tab-btn" onclick="switchTab('vocab')">Vocab Bank</button>
</div>

<div id="practice" class="container active">
    <div class="section-nav">
        <button class="nav-item active" onclick="showSec(1)">1. Intro</button>
        <button class="nav-item" onclick="showSec(2)">2. Purpose</button>
        <button class="nav-item" onclick="showSec(3)">3. Details</button>
        <button class="nav-item" onclick="showSec(4)">4. Offer</button>
        <button class="nav-item" onclick="showSec(5)">5. Invite</button>
        <button class="nav-item" onclick="showSec(6)">6. Closing</button>
    </div>

    <div id="sec1" class="sec-content">
        <div class="card">
            <span class="box-label">Greeting</span>
            <div id="g-list"></div>
        </div>
        <div class="card">
            <span class="box-label">Welcome the Audience</span>
            <div id="w-list"></div>
        </div>
        <div class="card">
            <span class="box-label">Introduction</span>
            <div id="i-list"></div>
        </div>
    </div>

    <div id="sec2" class="sec-content" style="display:none">
        <div id="purpose-boxes"></div>
    </div>

    <div id="sec3" class="sec-content" style="display:none">
        <div class="card">
            <span class="box-label">1. Starting from (Select Date)</span>
            <div class="detail-input-group">
                <input type="date" id="dateInput" value="2026-07-15">
                <button class="btn-mini" onclick="speakDetail('Starting from ' + formatDate(document.getElementById('dateInput').value))">🔊 Listen</button>
            </div>
        </div>
        <div class="card">
            <span class="box-label">2. Topic Name</span>
            <div id="name-list"></div>
        </div>
        <div class="card">
            <span class="box-label">3. Fee (Set Price)</span>
            <div class="detail-input-group">
                <span>$</span><input type="number" id="feeInput" value="100" style="width:80px">
                <button class="btn-mini" onclick="speakDetail('The fee is ' + document.getElementById('feeInput').value + ' dollars')">🔊 Listen</button>
            </div>
        </div>
    </div>

    <div id="sec4" class="sec-content" style="display:none">
        <div class="card"><span class="box-label">Offer Expressions</span><div id="offer-list"></div></div>
    </div>
    <div id="sec5" class="sec-content" style="display:none">
        <div class="card"><span class="box-label">Invitation Expressions</span><div id="invite-list"></div></div>
    </div>

    <div id="sec6" class="sec-content" style="display:none">
        <div class="card">
            <span class="box-label">Closing</span>
            <div id="c-close"></div>
        </div>
        <div class="card">
            <span class="box-label">Thank the Audience</span>
            <div id="c-thank"></div>
        </div>
        <div class="card">
            <span class="box-label">Questions</span>
            <div id="c-q"></div>
        </div>
    </div>
</div>

<div id="vocab" class="container">
    <div class="vocab-grid" id="vocabGrid"></div>
</div>

<script>
    const data = {
        greetings: ["Good morning, everybody!", "Good afternoon, everybody!", "Hi/Hello, everybody!"],
        welcomes: ["Thank you for coming to this briefing session.", "Thank you for coming today.", "Welcome to today’s briefing session."],
        intros: ["My name is [Name] and I’m the [Role] at [Company].", "I’m [Name], a [Role] at [Company]."],
        purposes: [
            { label: "Homework Help App", product: "homework help app" },
            { label: "Book Exchange Service", product: "book exchange service" },
            { label: "Recycled Clothing Store", product: "recycled clothing store" },
            { label: "Art Class for Kids", product: "art class for kids" }
        ],
        purposeExps: [
            "Today, I’m going to introduce you to a new [product].",
            "Today, I’d like to introduce a new [product] to you.",
            "May I take this opportunity today to introduce a new [product] to you?"
        ],
        names: ["Wise Learners", "Great Book Exchange", "Eco Closet", "Best Art Class"],
        offers: [
            "If you enrol for the course this month, we’ll offer you a [gift].",
            "We would be happy to offer you a [gift].",
            "Our company is pleased to offer you a [gift]."
        ],
        invites: [
            "You’re invited to our taster session so that you can learn more.",
            "Would you like to come to our trial class?",
            "I'd like to invite you to our demonstration."
        ],
        closings: ["That’s the end of my briefing.", "That’s all for my briefing."],
        thanks: ["Thank you for listening.", "Thank you very much for your attention.", "Thank you for your time."],
        questions: ["Do you have any questions?", "Are there any questions? I’d be pleased to answer them.", "I’d be glad to answer any questions you might have."]
    };

    const vocabs = [
        {w: "enrol", t: "v"}, {w: "register", t: "v"}, {w: "sign up", t: "v"}, {w: "visit", t: "v"},
        {w: "activities", t: "n"}, {w: "demonstration", t: "n"}, {w: "enquiries", t: "n"}, {w: "families", t: "n"},
        {w: "hotline", t: "n"}, {w: "information", t: "n"}, {w: "kit", t: "n"}, {w: "leaflet", t: "n"},
        {w: "limited (ltd)", t: "n"}, {w: "manager", t: "n"}, {w: "membership", t: "n"}, {w: "organisation", t: "n"},
        {w: "participant", t: "n"}, {w: "pop-up store", t: "n"}, {w: "poster", t: "n"}, {w: "practice", t: "n"},
        {w: "products", t: "n"}, {w: "purchase", t: "n"}, {w: "reader", t: "n"}, {w: "sales", t: "n"},
        {w: "store", t: "n"}, {w: "subjects", t: "n"}, {w: "taster", t: "n"}, {w: "trial", t: "n"}, {w: "website", t: "n"},
        {w: "creative", t: "adj"}, {w: "different", t: "adj"}, {w: "eco-friendly", t: "adj"}, {w: "elite", t: "adj"}
    ];

    function switchTab(id) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
    }

    function showSec(num) {
        document.querySelectorAll('.sec-content').forEach(s => s.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('sec' + num).style.display = 'block';
        event.target.classList.add('active');
    }

    function renderList(targetId, list) {
        const container = document.getElementById(targetId);
        container.innerHTML = list.map(text => `
            <div class="exp-row">
                <span class="exp-text">${text}</span>
                <button class="btn-mini" onclick="speakDetail('${text.replace(/'/g, "\\'")}')">🔊</button>
            </div>
        `).join('');
    }

    function renderPurpose() {
        const container = document.getElementById('purpose-boxes');
        container.innerHTML = data.purposes.map(p => `
            <div class="card">
                <span class="box-label">${p.label}</span>
                ${data.purposeExps.map(exp => {
                    const fullText = exp.replace('[product]', p.product);
                    return `<div class="exp-row">
                        <span class="exp-text">${fullText}</span>
                        <button class="btn-mini" onclick="speakDetail('${fullText.replace(/'/g, "\\'")}')">🔊</button>
                    </div>`;
                }).join('')}
            </div>
        `).join('');
    }

    function speakDetail(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'en-US'; msg.rate = 0.85;
        window.speechSynthesis.speak(msg);
    }

    function formatDate(dateStr) {
        if(!dateStr) return "";
        const date = new Date(dateStr);
        return date.toLocaleDateString('en-US', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    // Init Logic
    renderList('g-list', data.greetings);
    renderList('w-list', data.welcomes);
    renderList('i-list', data.intros);
    renderPurpose();
    renderList('name-list', data.names);
    renderList('offer-list', data.offers);
    renderList('invite-list', data.invites);
    renderList('c-close', data.closings);
    renderList('c-thank', data.thanks);
    renderList('c-q', data.questions);

    // Vocab Grid
    document.getElementById('vocabGrid').innerHTML = vocabs.map(v => `
        <div class="vocab-item">
            <span class="v-tag ${v.t === 'v' ? 'v-verb' : v.t === 'n' ? 'v-noun' : 'v-adj'}" 
                  style="background:${v.t==='v'?'#dcfce7':v.t==='n'?'#dbeafe':'#fef9c3'}">
                ${v.t.toUpperCase()}
            </span>
            <span class="vocab-word">${v.w}</span>
            <button class="btn-mini" onclick="speakDetail('${v.w}')">🔊 Listen</button>
        </div>
    `).join('');

</script>
</body>
</html>
